<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Offline Notepad — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">📝</span>
                <div class="title-col">
                    <h1>Quantum Offline Notepad</h1>
                    <p class="tagline">Write temporary scripts, notes, or lists instantly in your browser.</p>
                </div>
            </div>
            <div class="badge">productivity</div>
        </header>

        <main class="workspace-card">
            
            <textarea id="note-box" style="width: 100%; height: 250px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; color: #fff; padding: 16px; font-family: sans-serif; resize: none; outline: none;"></textarea>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
